<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Timetable - スタッフシフト表</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <h1>🗓️ Staff Timetable</h1>
    <div class="toolbar">
      <div class="week-nav">
        <button id="prevWeek" class="btn" title="前の週">◀</button>
        <span id="weekLabel" class="week-label">―</span>
        <button id="nextWeek" class="btn" title="次の週">▶</button>
        <button id="todayBtn" class="btn btn-ghost">今週</button>
      </div>
      <div class="spacer"></div>
      <label class="mode-switch">
        <input type="checkbox" id="editToggle" />
        <span>編集モード</span>
      </label>
      <div class="menu">
        <button id="menuBtn" class="btn btn-ghost" title="メニュー">⋯</button>
        <div id="menuPanel" class="menu-panel" hidden>
          <button id="exportBtn" class="menu-item">JSON エクスポート</button>
          <button id="importBtn" class="menu-item">JSON インポート</button>
          <button id="printBtn" class="menu-item">印刷</button>
          <hr />
          <button id="resetBtn" class="menu-item danger">全データをリセット</button>
        </div>
      </div>
      <input type="file" id="importFile" accept="application/json" hidden />
    </div>
  </header>

  <main>
    <div id="editControls" class="edit-controls" hidden>
      <button id="addStaffBtn" class="btn btn-primary">＋ スタッフ追加</button>
      <span class="hint">セルをクリックしてシフトを入力 / スタッフ名をクリックして編集</span>
    </div>

    <div class="table-wrap">
      <table id="timetable" class="timetable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody"></tbody>
      </table>
    </div>

    <section class="legend">
      <h2>シフト凡例</h2>
      <ul id="legendList" class="legend-list"></ul>
    </section>
  </main>

  <!-- セル編集モーダル -->
  <div id="cellModal" class="modal" hidden>
    <div class="modal-card">
      <h3 id="cellModalTitle">シフト入力</h3>
      <div class="preset-grid" id="presetGrid"></div>
      <label class="field">
        <span>自由入力（例: 9:00-18:00）</span>
        <input type="text" id="cellInput" placeholder="シフト内容" />
      </label>
      <div class="modal-actions">
        <button id="cellClear" class="btn btn-ghost">クリア</button>
        <div class="spacer"></div>
        <button id="cellCancel" class="btn btn-ghost">キャンセル</button>
        <button id="cellSave" class="btn btn-primary">保存</button>
      </div>
    </div>
  </div>

  <footer class="app-footer">
    <span>データはこのブラウザ内（localStorage）に保存されます。バックアップは JSON エクスポートをご利用ください。</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
